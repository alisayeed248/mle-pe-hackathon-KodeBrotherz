services:
  # Nginx - Load balancer & reverse proxy (entry point)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - app1
      - app2
      - app3
      - app4
      - app5
    restart: always

  # Nginx Prometheus Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - '-nginx.scrape-uri=http://nginx:80/nginx_status'
    depends_on:
      - nginx
    restart: always

  # Flask App Replicas
  app1:
    build: .
    environment: &app-env
      - FLASK_DEBUG=false
      - DATABASE_NAME=hackathon_db
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  app2:
    build: .
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  app3:
    build: .
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  app4:
    build: .
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  app5:
    build: .
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=hackathon_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MAX_CONNECTIONS=500
    command: postgres -c max_connections=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # Redis - Caching layer
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - alertmanager
    restart: always

  # Alertmanager - Alert routing and notifications
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    environment:
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_TO=${SMTP_TO}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.template.yml:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed -e "s|\$${SMTP_FROM}|$$SMTP_FROM|g" \
            -e "s|\$${SMTP_TO}|$$SMTP_TO|g" \
            -e "s|\$${SMTP_PASSWORD}|$$SMTP_PASSWORD|g" \
            /etc/alertmanager/alertmanager.template.yml > /tmp/alertmanager.yml && \
        /bin/alertmanager --config.file=/tmp/alertmanager.yml
    depends_on:
      - discord-webhook
    restart: always

  # Discord webhook adapter (translates Alertmanager format to Discord format)
  discord-webhook:
    image: benjojo/alertmanager-discord
    environment:
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK_URL}
    restart: always

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: always

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    restart: always

  # Promtail - Log collector (ships logs to Loki)
  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./infra/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: always

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data: