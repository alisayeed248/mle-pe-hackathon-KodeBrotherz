<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      h1 {
        text-align: center;
        margin-bottom: 8px;
        font-size: 28px;
      }
      .subtitle {
        text-align: center;
        color: #888;
        margin-bottom: 32px;
        font-size: 14px;
      }
      .input-group {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      input[type="text"] {
        flex: 1;
        padding: 14px 16px;
        border: 1px solid #333;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
        font-size: 16px;
      }
      input::placeholder {
        color: #666;
      }
      button {
        padding: 14px 24px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #4338ca;
      }
      button:disabled {
        background: #333;
        cursor: not-allowed;
      }
      .result {
        margin-top: 24px;
        padding: 16px;
        background: rgba(79, 70, 229, 0.2);
        border-radius: 8px;
        display: none;
      }
      .result.show {
        display: block;
      }
      .result-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
      }
      .result-url {
        font-size: 18px;
        word-break: break-all;
      }
      .result-url a {
        color: #818cf8;
        text-decoration: none;
      }
      .result-url a:hover {
        text-decoration: underline;
      }
      .error {
        margin-top: 16px;
        padding: 12px;
        background: rgba(239, 68, 68, 0.2);
        border-radius: 8px;
        color: #f87171;
        display: none;
      }
      .error.show {
        display: block;
      }
      .stats {
        margin-top: 16px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔗 URL Shortener</h1>
      <p class="subtitle">Production Engineering Hackathon</p>

      <div class="input-group">
        <input type="text" id="url" placeholder="Paste your long URL here..." />
        <button id="shorten">Shorten</button>
      </div>

      <div class="input-group">
        <input type="text" id="custom" placeholder="Custom code (optional)" />
      </div>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="result-label">Your shortened URL:</div>
        <div class="result-url">
          <a id="short-url" href="#" target="_blank"></a>
        </div>
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <script>
      const urlInput = document.getElementById("url");
      const customInput = document.getElementById("custom");
      const shortenBtn = document.getElementById("shorten");
      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");
      const shortUrlLink = document.getElementById("short-url");
      const statsDiv = document.getElementById("stats");

      shortenBtn.addEventListener("click", async () => {
        const url = urlInput.value.trim();
        const customCode = customInput.value.trim();

        if (!url) {
          showError("Please enter a URL");
          return;
        }

        shortenBtn.disabled = true;
        shortenBtn.textContent = "...";
        hideError();

        try {
          const body = { url };
          if (customCode) body.custom_code = customCode;

          const start = performance.now();
          const res = await fetch("/shorten", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const elapsed = (performance.now() - start).toFixed(0);

          const data = await res.json();

          if (!res.ok) {
            showError(data.error || "Something went wrong");
            return;
          }

          shortUrlLink.href = data.short_url;
          shortUrlLink.textContent = data.short_url;
          resultDiv.classList.add("show");
          statsDiv.textContent = `Response time: ${elapsed}ms`;
        } catch (err) {
          showError("Network error");
        } finally {
          shortenBtn.disabled = false;
          shortenBtn.textContent = "Shorten";
        }
      });

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.classList.add("show");
        resultDiv.classList.remove("show");
      }

      function hideError() {
        errorDiv.classList.remove("show");
      }

      urlInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") shortenBtn.click();
      });
    </script>
  </body>
</html>
