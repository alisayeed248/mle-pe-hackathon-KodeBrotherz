server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Flask app logs (JSON structured)
  - job_name: flask-apps
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only collect logs from our app containers
      - source_labels: ['__meta_docker_container_name']
        regex: '.*app[123].*'
        action: keep
      # Extract container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: container
      # Add service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            level: level
            component: component
            message: message
            timestamp: timestamp
      # Use extracted timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Add level as label for filtering
      - labels:
          level:
          component:

  # Nginx logs (capture 499s and timeouts)
  - job_name: nginx
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '.*nginx-1.*'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      # Extract status code and classify level
      - regex:
          expression: '" (?P<status>\d{3}) '
      - labels:
          status:
      # Set level based on status code
      - template:
          source: level
          template: '{{ if or (eq .status "499") (eq .status "500") (eq .status "502") (eq .status "503") (eq .status "504") }}ERROR{{ else if or (eq .status "400") (eq .status "404") (eq .status "405") }}WARNING{{ else }}INFO{{ end }}'
      - labels:
          level:
