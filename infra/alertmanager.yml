global:
  resolve_timeout: 1m
  # Gmail SMTP settings
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: '${SMTP_FROM}'
  smtp_auth_username: '${SMTP_FROM}'
  smtp_auth_password: '${SMTP_PASSWORD}'

route:
  receiver: 'discord'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Route critical alerts to both Discord AND Email
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: false
    - match:
        severity: warning
      receiver: 'discord'
      continue: false
    - match:
        severity: info
      receiver: 'discord'
      continue: false

receivers:
  # Critical: Discord + Email (wake up the engineer!)
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://discord-webhook:9094'
        send_resolved: true
    email_configs:
      - to: '${SMTP_TO}'
        send_resolved: true
        headers:
          subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }} - URL Shortener'
        html: |
          <h2>🚨 Critical Alert: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Status:</strong> {{ .Status | toUpper }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</p>
          {{ if .Annotations.runbook }}
          <p><strong>Runbook:</strong></p>
          <pre>{{ .Annotations.runbook }}</pre>
          {{ end }}
          {{ end }}
          <hr>
          <p><a href="http://localhost:3000">Grafana Dashboard</a> | <a href="http://localhost:9090/alerts">Prometheus Alerts</a></p>

  # Warning/Info: Discord only
  - name: 'discord'
    webhook_configs:
      - url: 'http://discord-webhook:9094'
        send_resolved: true
