events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging format
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Upstream - load balance across 3 app replicas
  upstream flask_app {
      least_conn;  # Send to least busy server
      server app1:5000;
      server app2:5000;
      server app3:5000;
  }

  server {
    listen 80;
    server_name _;

    # Static files (landing page)
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html @backend;
    }

    location /static/ {
        root /usr/share/nginx/html;
    }

    # API routes - proxy to Flask
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Named location for fallback to backend
    location @backend {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx status for Prometheus exporter
      location /nginx_status {
          stub_status on;
          allow 172.0.0.0/8;  # Allow Docker network
          allow 127.0.0.1;
          deny all;
      }
  }
}